{% load static %}
<nav class="navbar">
  <div class="container navbar-inner">
    <a href="{% url 'index' %}" class="navbar-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/>
      </svg>
      <span class="navbar-brand-text">Plan N'Go</span>
    </a>

    <div style="display:flex; align-items:center; gap:0.75rem;">
      {% if user.is_authenticated %}
        <a href="{% url 'destinations:dashboard' %}" class="btn btn-ghost btn-sm">Meus Destinos</a>
        <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
          {% csrf_token %}
          <button type="submit" class="btn btn-ghost btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm">Entrar</a>
        <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">Cadastrar</a>
      {% endif %}
    </div>
  </div>
</nav>
