{% load static %}
<nav class="app-navbar">
  <div class="container app-navbar__inner">

    <a href="{% url 'index' %}" class="app-navbar__brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/>
      </svg>
      <span>Plan N'Go</span>
    </a>

    <div class="app-navbar__actions">
      {% if user.is_authenticated %}
        <a href="{% url 'destinations:dashboard' %}" class="app-navbar__link">
          Meus Destinos
        </a>
        <a href="{% url 'lists:dashboard' %}" class="app-navbar__link">
          Listas
        </a>
        <a href="{% url 'roteiros:dashboard' %}" class="app-navbar__link">
          Roteiros
        </a>

        <div class="app-navbar__divider"></div>

        <!-- Perfil -->
        <a href="{% url 'accounts:profile_setup' %}" class="app-navbar__profile">
          {% if user.avatar %}
            <img src="{{ user.avatar.url }}" alt="{{ user.public_name }}" class="app-navbar__avatar" />
          {% else %}
            <div class="app-navbar__avatar app-navbar__avatar--initials">
              {{ user.initials }}
            </div>
          {% endif %}
          <span class="app-navbar__profile-name">{{ user.public_name }}</span>
        </a>

        <!-- Sair -->
        <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
          {% csrf_token %}
          <button type="submit" class="app-navbar__logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </form>

      {% else %}
        <a href="{% url 'accounts:login' %}"    class="app-navbar__link">Entrar</a>
        <a href="{% url 'accounts:register' %}" class="app-navbar__btn">Cadastrar</a>
      {% endif %}
    </div>

  </div>
</nav>
