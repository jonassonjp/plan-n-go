{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Plan N'Go{% endblock %}</title>
  <meta name="description" content="{% block description %}Catalogue seus destinos dos sonhos e planeje viagens inesquecíveis.{% endblock %}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

  <!-- Design System -->
  <link rel="stylesheet" href="{% static 'css/plango.css' %}" />

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% block body %}{% endblock %}

  <!-- JavaScript -->
  <script src="{% static 'js/plango.js' %}"></script>
  {% block extra_js %}{% endblock %}

</body>
</html>
