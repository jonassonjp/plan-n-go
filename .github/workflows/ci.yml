name: CI — Testes e Qualidade

on:
  push:
    branches: ["main", "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Testes unitários e integração
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Copiar .env de exemplo
        run: cp .env.example .env

      - name: Rodar migrações
        run: python manage.py migrate --no-input
        env:
          SECRET_KEY: "ci-secret-key-nao-usar-em-producao"
          DEBUG: "True"

      - name: Rodar testes com cobertura
        run: python -m pytest --no-cov -v
        env:
          SECRET_KEY: "ci-secret-key-nao-usar-em-producao"
          DEBUG: "True"

      - name: Upload do relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install ruff
      - name: Verificar formatação e estilo
        run: ruff check . --select E,F,W --ignore E501
